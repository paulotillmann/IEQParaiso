<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IEQ Paraíso - Sistema de Gestão</title>
    <meta name="description" content="Sistema de gestão de membros, visitantes, cultos e presenças da Igreja do Evangelho Quadrangular - Bairro Paraíso." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            borderColor: {
              DEFAULT: "hsl(var(--border))",
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
              // Paleta Oficial IEQ (CMYK convertido)
              brand: {
                purple: '#8b2b9e', // Roxo (CMYK 60, 100, 0, 0)
                blue: '#00b2ff',   // Azul (CMYK 100, 30, 0, 0)
                yellow: '#ffcc00', // Amarelo (CMYK 0, 20, 100, 0)
                red: '#ff0000',    // Vermelho (CMYK 0, 100, 100, 0)
                gray: '#666666',   // Cinza (CMYK 0, 0, 0, 60)
              },
              // Redireciona a família indigo para o Roxo IEQ
              indigo: {
                50: '#fdf7fe',
                100: '#faebff',
                200: '#f3d4ff',
                300: '#e7aeff',
                400: '#d77bff',
                500: '#a54eff',
                600: '#8b2b9e', // Roxo Principal
                700: '#752086',
                800: '#601a6f',
                900: '#50175c',
                950: '#32073c',
              },
              // Redireciona a família blue para o Azul IEQ
              blue: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#00b2ff', // Azul Principal
                600: '#0099e6',
                700: '#0077b3',
                800: '#006699',
                900: '#005580',
                950: '#00334d',
              },
              // Redireciona a família red para o Vermelho IEQ
              red: {
                50: '#fff5f5',
                100: '#ffe3e3',
                200: '#ffc9c9',
                300: '#ffa8a8',
                400: '#ff8787',
                500: '#ff0000', // Vermelho Principal
                600: '#e60000',
                700: '#cc0000',
                800: '#b30000',
                900: '#800000',
                950: '#4d0000',
              },
              // Redireciona a família yellow para o Amarelo IEQ
              yellow: {
                50: '#fffdf0',
                100: '#fffbeb',
                200: '#fef7c3',
                300: '#fde885',
                400: '#fcd34d',
                500: '#ffcc00', // Amarelo Principal
                600: '#e6b800',
                700: '#cc9e00',
                800: '#b38a00',
                950: '#4d3b00',
              },
              // Mapeia gray e slate para o Cinza IEQ
              gray: {
                50: '#f9f9f9',
                100: '#f3f3f3',
                200: '#e3e3e3',
                300: '#cccccc',
                400: '#a3a3a3',
                500: '#666666', // Cinza Principal
                600: '#5c5c5c',
                700: '#4d4d4d',
                800: '#3d3d3d',
                900: '#1a1a1a',
                950: '#0d0d0d',
              },
              slate: {
                50: '#f9f9f9',
                100: '#f3f3f3',
                200: '#e3e3e3',
                300: '#cccccc',
                400: '#a3a3a3',
                500: '#666666',
                600: '#5c5c5c',
                700: '#4d4d4d',
                800: '#3d3d3d',
                900: '#1a1a1a',
                950: '#0d0d0d',
              }
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          },
        },
      }
    </script>
    <style>
      *, ::before, ::after {
        border-color: hsl(var(--border));
      }
      :root {
        --background: 210 100% 98%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --primary: 292 60% 39%;
        --primary-foreground: 0 0% 100%;
        --secondary: 210 40% 96.1%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96.1%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --accent: 210 40% 96.1%;
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 100% 50%;
        --destructive-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 292 60% 39%;
        --radius: 0.5rem;
      }
      .dark {
        --background: 222.2 25% 7%;
        --foreground: 210 40% 98%;
        --card: 222.2 20% 10%;
        --card-foreground: 210 40% 98%;
        --popover: 222.2 20% 10%;
        --popover-foreground: 210 40% 98%;
        --primary: 292 70% 65%;
        --primary-foreground: 222.2 47.4% 11.2%;
        --secondary: 222.2 15% 13.5%;
        --secondary-foreground: 210 40% 98%;
        --muted: 222.2 15% 13.5%;
        --muted-foreground: 215 20.2% 65.1%;
        --accent: 222.2 15% 13.5%;
        --accent-foreground: 210 40% 98%;
        --destructive: 0 100% 50%;
        --destructive-foreground: 210 40% 98%;
        --border: 222.2 15% 12.5%;
        --input: 222.2 15% 12.5%;
        --ring: 292 70% 65%;
      }
      
      /* Custom Premium Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(139, 43, 158, 0.2);
        border-radius: 9999px;
        transition: background 0.2s ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(139, 43, 158, 0.6);
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(165, 78, 255, 0.25);
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(165, 78, 255, 0.6);
      }
      
      /* Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(139, 43, 158, 0.2) transparent;
      }
      .dark * {
        scrollbar-color: rgba(165, 78, 255, 0.25) transparent;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.43.4"
  }
}
</script>
</head>
  <body class="bg-background text-foreground font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
